<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your email — Taska</title>
</head>
<body style="margin:0;padding:0;background-color:#F7F6F2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;">

  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#F7F6F2;padding:48px 16px;">
    <tr>
      <td align="center">

        <!-- Card -->
        <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width:480px;background-color:#FFFFFF;border:1px solid #E8E7E3;border-radius:16px;overflow:hidden;">

          <!-- Header -->
          <tr>
            <td style="padding:32px 40px 24px;">
              <!-- Wordmark -->
              <span style="font-size:24px;font-weight:800;letter-spacing:-0.02em;color:#252336;">Taska<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background-color:#3A9E72;margin-left:3px;margin-bottom:2px;vertical-align:baseline;"></span></span>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 40px;">
              <div style="height:1px;background-color:#ECEAE6;"></div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:32px 40px;">
              <h1 style="margin:0 0 12px;font-size:22px;font-weight:700;letter-spacing:-0.01em;color:#252336;line-height:1.2;">Confirm your email address</h1>
              <p style="margin:0 0 28px;font-size:15px;line-height:1.6;color:#6B6A7E;">Follow the link below to confirm this email address and finish signing up.</p>

              <!-- Button -->
              <table cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td style="border-radius:10px;background-color:#252336;">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;font-size:14px;font-weight:600;color:#F7F6F2;text-decoration:none;letter-spacing:-0.01em;border-radius:10px;">Confirm email address</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 40px;">
              <div style="height:1px;background-color:#ECEAE6;"></div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 40px 32px;">
              <p style="margin:0;font-size:12.5px;line-height:1.6;color:#9B9AAB;">If you didn't create a Taska account, you can safely ignore this email. This link expires in 24 hours.</p>
            </td>
          </tr>

        </table>
        <!-- /Card -->

        <!-- Below card -->
        <p style="margin:20px 0 0;font-size:12px;color:#ADAC9A;">© Taska. A tidy home for freelance jobs.</p>

      </td>
    </tr>
  </table>

</body>
</html>
